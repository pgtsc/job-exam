<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ পরীক্ষা</title>
    <link rel="stylesheet" href="mcq.css">
  

    <!-- SweetAlert2 (Only remaining dependency for functional alerts) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Dynamic Loader Screen (Pure CSS) -->
    <div id="loaderContainer">
        <div class="spinner" role="status"></div>
        <div class="loader-text">প্রশ্নপত্র লোড হচ্ছে, অপেক্ষা করুন...</div>
    </div>

    <!-- Header Section -->
    <header class="custom-header">
        <h1>উত্তরণ জব প্রস্তুতি একাডেমি</h1>
        <p>স্বপ্ন থেকে সফলতার পথে আপনার বিশ্বস্ত সহযাত্রী</p>
    </header>

    <!-- Exam Information Section -->
    <div class="container">
        <div class="info-card">
            <div class="info-header text-center">
                📝 পরীক্ষা বিষয়ক তথ্য
            </div>
            <div class="info-body text-center">
                <div class="info-item">
                    <div class="info-title">পরীক্ষার বিষয়</div>
                    <div class="info-value">সাধারণ জ্ঞান</div>
                </div>
                <div class="info-item">
                    <div class="info-title">মোট প্রশ্ন</div>
                    <div class="info-value text-primary"><span id="infoTotalQuestions">--</span> টি</div>
                </div>
                <div class="info-item">
                    <div class="info-title">পূর্ণমান</div>
                    <div class="info-value text-success"><span id="infoTotalMarks">--</span> নম্বর</div>
                </div>
                <div class="info-item">
                    <div class="info-title">নেগেটিভ মার্ক</div>
                    <div class="info-value text-danger">০.২৫</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container pb-5">
        <!-- Score Display -->
        <div id="scoreSection" class="score-box text-center d-none">
            <h2 class="score-title">পরীক্ষার ফলাফল</h2>
            <div id="scoreText" class="score-number">০ / ০</div>
            <div id="scoreDetails" class="score-details"></div>
        </div>

        <!-- Quiz Form -->
        <form id="quizForm" novalidate>
            <div id="quizContainer"></div>
            <button type="submit" class="custom-btn" id="submitBtn">ফলাফল দেখুন</button>
        </form>
    </div>

    <script>
        const quizContainer = document.getElementById('quizContainer');
        const quizForm = document.getElementById('quizForm');
        const scoreSection = document.getElementById('scoreSection');
        const scoreText = document.getElementById('scoreText');
        const scoreDetails = document.getElementById('scoreDetails');
        const loaderContainer = document.getElementById('loaderContainer');
        
        const infoTotalQuestions = document.getElementById('infoTotalQuestions');
        const infoTotalMarks = document.getElementById('infoTotalMarks');

        const googleSheetUrl = "https://script.google.com/macros/s/AKfycbwZsharp4bpVY5byfdOZWtSQLYIeZDIyTSdU4ihO3oVgRGvePlr3BEMcuKOdUYPEAwDEA/exec"; 
        const negativeMarkPerQuestion = 0.25; 

        // ১. গুগল শীট থেকে ডেটা নিয়ে আসার ফাংশন
        function fetchQuizData() {
            // প্রথমে চেক করছি sessionStorage-এ আগের কোনো ডেটা সেভ করা আছে কিনা
            const cachedData = sessionStorage.getItem('quizDataCache');

            if (cachedData) {
                // যদি মেমোরিতে ডেটা থাকে, তবে সার্ভারে রিকোয়েস্ট না পাঠিয়ে সরাসরি সেখান থেকে লোড হবে
                const data = JSON.parse(cachedData);
                window.quizQuestions = data; 
                loadQuiz(data);
                
                if(data && data.length > 0) {
                    infoTotalQuestions.innerText = data.length;
                    infoTotalMarks.innerText = data.length; 
                }

                // লোডার স্ক্রিন হাইড করা
                loaderContainer.style.opacity = '0';
                setTimeout(() => loaderContainer.classList.add('d-none'), 300);
                
                console.log("Data loaded from sessionStorage (No server request made).");
            } else {
                // যদি মেমোরিতে ডেটা না থাকে, তবেই কেবল প্রথমবার সার্ভার থেকে ফেস (Fetch) করবে
                fetch(googleSheetUrl)
                    .then(response => response.json())
                    .then(data => {
                        // সার্ভার থেকে পাওয়া ডেটা sessionStorage-এ 'quizDataCache' নামে সেভ করে রাখা হচ্ছে
                        sessionStorage.setItem('quizDataCache', JSON.stringify(data));
                        
                        window.quizQuestions = data; 
                        loadQuiz(data);
                        
                        if(data && data.length > 0) {
                            infoTotalQuestions.innerText = data.length;
                            infoTotalMarks.innerText = data.length; 
                        }

                        loaderContainer.style.opacity = '0';
                        setTimeout(() => loaderContainer.classList.add('d-none'), 300);
                        
                        console.log("Data loaded from Server and saved to sessionStorage.");
                    })
                    .catch(error => {
                        console.error("Error fetching data:", error);
                        loaderContainer.classList.add('d-none');
                        Swal.fire({
                            icon: 'error',
                            title: 'দুঃখিত!',
                            text: 'Server থেকে ডাটা লোড করতে সমস্যা হচ্ছে। পেজটি রিফ্রেশ করুন।',
                            confirmButtonColor: '#4a00e0'
                        });
                    });
            }
        }
        fetchQuizData();

        // ২. প্রশ্নগুলো ডাইনামিকালি লোড করার ফাংশন
        function loadQuiz(questions) {
            quizContainer.innerHTML = "";
            
            if(!questions || questions.length === 0) {
                quizContainer.innerHTML = "<p class='text-center' style='font-size:1.25rem;'>কোনো প্রশ্ন খুঁজে পাওয়া যায়নি।</p>";
                return;
            }

            questions.forEach((q) => {
                const card = document.createElement('div');
                card.className = 'quiz-card';
                card.setAttribute('data-sl', q.SL);

                card.innerHTML = `
                    <div class="question-title">${q.SL}. ${q.Questions}</div>
                    <div class="options-grid">
                        <label class="option-label" id="label-${q.SL}-Option_A">
                            <input type="radio" name="question-${q.SL}" value="Option_A"> ${q.Option_A}
                        </label>
                        <label class="option-label" id="label-${q.SL}-Option_B">
                            <input type="radio" name="question-${q.SL}" value="Option_B"> ${q.Option_B}
                        </label>
                        <label class="option-label" id="label-${q.SL}-Option_C">
                            <input type="radio" name="question-${q.SL}" value="Option_C"> ${q.Option_C}
                        </label>
                        <label class="option-label" id="label-${q.SL}-Option_D">
                            <input type="radio" name="question-${q.SL}" value="Option_D"> ${q.Option_D}
                        </label>
                    </div>
                    <div class="explanation-box d-none" id="desc-${q.SL}">
                        <strong>ব্যাখ্যা:</strong> ${q.Description || 'এই প্রশ্নের কোনো ব্যাখ্যা নেই।'}
                    </div>
                `;
                quizContainer.appendChild(card);
            });
        }

        // ৩. সাবমিট ও নেগেটিভ মার্কিং হিসাব প্রসেস
        quizForm.addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            if (!window.quizQuestions) return;

            let unansweredCount = 0;

            window.quizQuestions.forEach(q => {
                const checkedOption = quizForm.querySelector(`input[name="question-${q.SL}"]:checked`);
                if (!checkedOption) {
                    unansweredCount++;
                }
            });

            if (unansweredCount > 0) {
                Swal.fire({
                    icon: 'warning',
                    title: 'উত্তর বাকি আছে!',
                    text: `আপনি এখনো ${unansweredCount}টি প্রশ্নের উত্তর দেননি। দয়া করে সবগুলো প্রশ্নের উত্তর দিন।`,
                    confirmButtonColor: '#e74c3c',
                    confirmButtonText: 'ঠিক আছে'
                });
                return;
            }

            let correctCount = 0;
            let wrongCount = 0;
            const totalQuestions = window.quizQuestions.length;

            window.quizQuestions.forEach(q => {
                const selectedOption = quizForm.querySelector(`input[name="question-${q.SL}"]:checked`);
                const correctAnswer = q.Answer ? q.Answer.trim() : ""; 

                ['Option_A', 'Option_B', 'Option_C', 'Option_D'].forEach(opt => {
                    const labelEl = document.getElementById(`label-${q.SL}-${opt}`);
                    if(labelEl) labelEl.classList.remove('correct', 'wrong');
                });

                const correctLabel = document.getElementById(`label-${q.SL}-${correctAnswer}`);
                if(correctLabel) correctLabel.classList.add('correct');

                if (selectedOption) {
                    const userAnswer = selectedOption.value;
                    if (userAnswer === correctAnswer) {
                        correctCount++; 
                    } else {
                        wrongCount++;
                        const wrongLabel = document.getElementById(`label-${q.SL}-${userAnswer}`);
                        if(wrongLabel) wrongLabel.classList.add('wrong');
                    }
                }

                const descBox = document.getElementById(`desc-${q.SL}`);
                if(descBox) descBox.classList.remove('d-none');
            });

            let totalDeduction = wrongCount * negativeMarkPerQuestion;
            let finalScore = correctCount - totalDeduction;
            
            if (finalScore < 0) {
                finalScore = 0;
            }

            Swal.fire({
                icon: 'success',
                title: 'অভিনন্দন!',
                text: `আপনার পরীক্ষা সফলভাবে সম্পন্ন হয়েছে। চূড়ান্ত স্কোর: ${finalScore}/${totalQuestions}`,
                confirmButtonColor: '#4a00e0',
                confirmButtonText: 'স্কোরবোর্ড দেখুন'
            }).then(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            scoreText.innerHTML = `${finalScore} / ${totalQuestions}`;
            scoreDetails.innerHTML = `
                <span style="color:#2ecc71; font-weight:bold;">সঠিক উত্তর: ${correctCount}টি</span> | 
                <span style="color:#e74c3c; font-weight:bold;">ভুল উত্তর: ${wrongCount}টি</span> | 
                <span style="color:#6c757d; font-weight:bold;">কাটা নম্বর: ${totalDeduction}</span>
                <p style="margin-top: 8px;">নিচে আপনার সঠিক ও ভুল উত্তরগুলো ব্যাখ্যাসহ দেখে নিন।</p>
            `;
            scoreSection.classList.remove('d-none');
            
            quizForm.querySelectorAll('input[type="radio"]').forEach(input => input.disabled = true);
            document.getElementById('submitBtn').classList.add('d-none');
        });
    </script>
</body>
</html>
